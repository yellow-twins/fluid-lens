name: QA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qa:
    name: QA on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Coding standard (PSR-12)
        run: composer cs

      - name: Static analysis (PHPStan level 7)
        run: composer stan

      - name: Static analysis (Psalm level 6)
        run: composer psalm

      - name: Tests (PHPUnit)
        run: composer test
